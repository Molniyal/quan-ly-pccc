<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCCC Digital - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* GIỮ NGUYÊN CSS TRƯỚC CỦA BẠN */
        :root { --primary: #ff4d4d; --success: #00e676; --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-gradient); color: white; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #fff, #ff4d4d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 24px; text-align: center; width: 350px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: center; }
        .stat-card h3 { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: 800; }
        .content-box { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 30px; margin-bottom: 40px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; color: rgba(255, 255, 255, 0.6); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .status-badge { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .status-dat { background: rgba(0, 230, 118, 0.2); color: var(--success); }
        .status-loi { background: rgba(255, 77, 77, 0.2); color: var(--primary); }
        
        /* CSS MỚI CHO BẢNG TIẾN ĐỘ XƯỞNG */
        .xuong-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .xuong-card { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 15px; padding: 15px; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.5s; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🔒 Admin Access</h2>
            <input type="text" id="adminID" placeholder="Nhập Mã Admin..." style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin: 20px 0; font-size: 16px; text-transform: uppercase;">
            <button class="btn" onclick="verifyLogin()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>PCCC DASHBOARD</h1>
            <p id="lastUpdate">Dữ liệu tháng này được cập nhật thời gian thực</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>TỔNG THIẾT BỊ</h3><div class="value" id="totalCheck">--</div></div>
            <div class="stat-card"><h3>BẤT THƯỜNG / LỖI</h3><div class="value" id="totalIssue" style="color: var(--primary);">--</div></div>
            <div class="stat-card"><h3>ĐÃ KIỂM THÁNG NÀY</h3><div class="value" id="monthProgress" style="color: var(--success);">--</div></div>
        </div>

        <div class="content-box">
            <h2>🏭 Tiến Độ Kiểm Tra Theo Xưởng</h2>
            <div class="xuong-grid" id="xuongContainer">
                </div>
        </div>

        <div class="content-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h2 style="margin: 0;">📜 50 Nhật ký kiểm tra gần nhất</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="searchTerm" placeholder="Tìm Mã TB / NV..." oninput="applyFilters()" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white;">
                    <select id="filterStatus" onchange="applyFilters()" style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #24243e; color: white;">
                        <option value="all">Tất cả</option><option value="loi">Chỉ LỖI</option><option value="dat">Chỉ ĐẠT</option>
                    </select>
                    <button class="btn" onclick="fetchData()" style="width: auto; padding: 10px 20px;">🔄 Tải lại</button>
                </div>
            </div>

            <div id="loading" style="text-align: center; display: none;">⏳ Đang tải dữ liệu...</div>
            <table>
                <thead>
                    <tr><th>Thời gian</th><th>Nhân viên</th><th>Mã Thiết bị</th><th>Trạng thái</th><th>Ghi chú</th><th>Hành động</th></tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDjEk_33uvlchMhSiYndcpBed8nfV_VDCBm2Msf6XI93wU-mMgpQC0eXQVa6fbAZ5W/exec";
        let fullData = [];

        async function verifyLogin() {
            const maNV = document.getElementById('adminID').value.trim().toUpperCase();
            if (!maNV) return;
            const btn = document.querySelector('.login-card .btn'); btn.innerText = "ĐANG XÁC THỰC...";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=verifyAdmin&maNV=${maNV}`);
                const data = await res.json();
                if (data.status === "success") { document.getElementById('login-overlay').style.display = "none"; fetchData(); } 
                else { alert(data.message); }
            } catch (e) { alert("Lỗi kết nối"); }
            btn.innerText = "ĐĂNG NHẬP";
        }

        async function fetchData() {
            document.getElementById('loading').style.display = "block";
            try {
                const res = await fetch(SCRIPT_URL + "?action=getDashboardData");
                const data = await res.json();
                fullData = data.logs;

                // Cập nhật số tổng
                document.getElementById('totalCheck').innerText = data.total;
                document.getElementById('totalIssue').innerText = data.issues;
                document.getElementById('monthProgress').innerText = data.monthCount;

                // VẼ TIẾN ĐỘ TỪNG XƯỞNG
                const xuongDiv = document.getElementById('xuongContainer');
                xuongDiv.innerHTML = "";
                for (const [tenXuong, thongKe] of Object.entries(data.xuongStats)) {
                    let tyLe = Math.round((thongKe.inspected / thongKe.total) * 100) || 0;
                    let thieu = thongKe.total - thongKe.inspected;
                    let color = thieu === 0 ? "var(--success)" : (tyLe > 50 ? "#ffd600" : "var(--primary)");
                    
                    xuongDiv.innerHTML += `
                        <div class="xuong-card">
                            <h3 style="margin:0 0 10px 0; color: #ddd;">${tenXuong}</h3>
                            <div style="display:flex; justify-content: space-between; font-size: 13px;">
                                <span>Đã kiểm: <b>${thongKe.inspected}/${thongKe.total}</b></span>
                                <span style="color: ${color}; font-weight:bold;">${tyLe}%</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${tyLe}%; background: ${color}"></div></div>
                            <div style="font-size: 12px; color: ${thieu > 0 ? 'var(--primary)' : 'var(--text-muted)'}; margin-top: 8px;">
                                ${thieu > 0 ? `⚠️ Còn thiếu: ${thieu} bình` : '✅ Đã hoàn thành'}
                            </div>
                        </div>
                    `;
                }

                renderTable(fullData);
            } catch (e) { alert("Lỗi khi tải dữ liệu!"); }
            document.getElementById('loading').style.display = "none";
        }

        function applyFilters() {
            const search = document.getElementById('searchTerm').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            renderTable(fullData.filter(log => {
                const isLoi = log.nq === "Lỗi" || log.as === "Lỗi" || log.hsd === "Hết hạn";
                return (log.tb.toLowerCase().includes(search) || log.nv.toLowerCase().includes(search)) && 
                       (status === "all" || (status === "loi" && isLoi) || (status === "dat" && !isLoi));
            }));
        }

        function renderTable(data) {
            const body = document.getElementById('logTableBody'); body.innerHTML = "";
            data.forEach(log => {
                const isLoi = log.nq === "Lỗi" || log.as === "Lỗi" || log.hsd === "Hết hạn";
                body.innerHTML += `
                    <tr>
                        <td>${new Date(log.time).toLocaleString('vi-VN')}</td>
                        <td>${log.nv}</td><td><strong style="color: ${isLoi ? 'var(--primary)' : '#fff'}">${log.tb}</strong></td>
                        <td><span class="status-badge ${isLoi ? 'status-loi' : 'status-dat'}">${isLoi ? '⚠️ LỖI' : '✅ ĐẠT'}</span></td>
                        <td>${log.note || '--'}</td>
                        <td>
                            <button class="btn" style="padding: 5px 10px; font-size: 11px; background: #555; width:auto;" onclick="window.open('${log.img}')">Xem ảnh</button>
                            ${isLoi ? `<button class="btn" style="padding: 5px 10px; font-size: 11px; width:auto; margin-left:5px;" onclick="sendAlert('${log.tb}', '${log.nv}', '${log.note}')">Gửi Email</button>` : ''}
                        </td>
                    </tr>`;
            });
        }

        async function sendAlert(maTB, tenNV, ghiChu) {
            if (!confirm(`Gửi email cho quản lý vị trí ${maTB}?`)) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sendAlertEmail&maTB=${maTB}&tenNV=${tenNV}&ghiChu=${ghiChu}`);
                if ((await res.json()).status === "success") alert("Đã gửi email!"); else alert("Lỗi!");
            } catch (e) { alert("Lỗi mạng!"); }
        }
    </script>
</body>
</html>
