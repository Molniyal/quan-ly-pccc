<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCCC Digital - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --success: #00e676;
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 350px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            margin: 20px 0;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Dashboard Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-card h3 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 800;
        }

        .content-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-dat {
            background: rgba(0, 230, 118, 0.2);
            color: var(--success);
        }

        .status-loi {
            background: rgba(255, 77, 77, 0.2);
            color: var(--primary);
        }

        .img-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🔒 Admin Access</h2>
            <p style="opacity: 0.6;">Nhập Mã Admin để quản lý dữ liệu</p>
            <input type="text" id="adminID" placeholder="Nhập Mã Admin (VD: Admin)"
                style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin: 20px 0; font-size: 16px; text-transform: uppercase;">
            <button class="btn" onclick="verifyLogin()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>PCCC DASHBOARD</h1>
            <p id="lastUpdate">Dữ liệu được cập nhật thời gian thực</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>TỔNG THIẾT BỊ</h3>
                <div class="value" id="totalCheck">--</div>
            </div>
            <div class="stat-card">
                <h3>BẤT THƯỜNG / LỖI</h3>
                <div class="value" id="totalIssue" style="color: var(--primary);">--</div>
            </div>
            <div class="stat-card">
                <h3>HOÀN THÀNH THÁNG NÀY</h3>
                <div class="value" id="monthProgress" style="color: var(--success);">--</div>
            </div>
        </div>

        <div class="content-box">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <h2 style="margin: 0;">📜 Nhật ký kiểm tra</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="searchTerm" placeholder="Tìm Mã TB / Nhân viên..." oninput="applyFilters()"
                        style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; width: 200px;">
                    <select id="filterStatus" onchange="applyFilters()"
                        style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #24243e; color: white;">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="loi">Chỉ vị trí LỖI</option>
                        <option value="dat">Chỉ vị trí ĐẠT</option>
                    </select>
                    <button class="btn" onclick="fetchData()" style="width: auto; padding: 10px 20px;">🔄 Tải
                        lại</button>
                </div>
            </div>

            <div id="loading">⏳ Đang tải dữ liệu...</div>
            <table>
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Nhân viên</th>
                        <th>Mã Thiết bị</th>
                        <th>Trạng thái</th>
                        <th>Ghi chú</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    <!-- Dữ liệu sẽ đổ vào đây -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTXKUljtslNHi4VCsIfBvBlmVzHm7xf2hR4lKJUUVI7FS5K0j-Fp_sMdPFqgOsuWly/exec";
        let fullData = [];

        async function verifyLogin() {
            const maNV = document.getElementById('adminID').value.trim().toUpperCase();
            if (!maNV) return alert("Vui lòng nhập Mã Admin!");

            const btn = document.querySelector('.login-card .btn');
            btn.disabled = true;
            btn.innerText = "ĐANG XÁC THỰC...";

            try {
                const res = await fetch(`${SCRIPT_URL}?action=verifyAdmin&maNV=${maNV}`);
                const data = await res.json();

                if (data.status === "success") {
                    document.getElementById('login-overlay').style.display = "none";
                    fetchData();
                } else {
                    alert("❌ Lỗi: " + (data.message || "Bạn không có quyền truy cập!"));
                }
            } catch (e) {
                alert("⚠️ Lỗi kết nối máy chủ!");
            } finally {
                btn.disabled = false;
                btn.innerText = "ĐĂNG NHẬP";
            }
        }

        async function fetchData() {
            document.getElementById('loading').style.display = "block";
            try {
                const res = await fetch(SCRIPT_URL + "?action=getDashboardData");
                const data = await res.json();
                fullData = data.logs;

                // Cập nhật thống kê
                document.getElementById('totalCheck').innerText = data.total;
                document.getElementById('totalIssue').innerText = data.issues;
                document.getElementById('monthProgress').innerText = data.monthCount;

                renderTable(fullData);
            } catch (e) {
                console.error(e);
                alert("Lỗi khi tải dữ liệu từ Google Sheet!");
            } finally {
                document.getElementById('loading').style.display = "none";
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchTerm').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;

            const filtered = fullData.filter(log => {
                const isLoi = log.nq === "Lỗi" || log.as === "Lỗi" || log.hsd === "Hết hạn";
                const matchSearch = log.tb.toLowerCase().includes(searchTerm) || log.nv.toLowerCase().includes(searchTerm);
                const matchStatus = (status === "all") || (status = "loi" && isLoi) || (status === "dat" && !isLoi);
                return matchSearch && matchStatus;
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const body = document.getElementById('logTableBody');
            body.innerHTML = "";
            data.forEach(log => {
                const row = document.createElement('tr');
                const isLoi = log.nq === "Lỗi" || log.as === "Lỗi" || log.hsd === "Hết hạn";
                row.innerHTML = `
                    <td>${new Date(log.time).toLocaleString('vi-VN')}</td>
                    <td>${log.nv}</td>
                    <td><strong style="color: var(--primary)">${log.tb}</strong></td>
                    <td><span class="status-badge ${isLoi ? 'status-loi' : 'status-dat'}">${isLoi ? '⚠️ CÓ LỖI' : '✅ ĐẠT'}</span></td>
                    <td>${log.note || '--'}</td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            <button class="btn" style="padding: 5px 10px; font-size: 11px; background: #555;" onclick="window.open('${log.img}', '_blank')">Xem ảnh</button>
                            ${isLoi ? `<button class="btn" style="padding: 5px 10px; font-size: 11px; background: var(--primary);" onclick="sendAlert('${log.tb}', '${log.nv}', '${log.note}')">Gửi Email</button>` : ''}
                        </div>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        async function sendAlert(maTB, tenNV, ghiChu) {
            if (!confirm(`Xác nhận gửi email cảnh báo cho vị trí ${maTB}?`)) return;

            try {
                const res = await fetch(`${SCRIPT_URL}?action=sendAlertEmail&maTB=${maTB}&tenNV=${tenNV}&ghiChu=${ghiChu}`);
                const data = await res.json();
                if (data.status === "success") {
                    alert("✅ Đã gửi email cảnh báo thành công!");
                } else {
                    alert("❌ Lỗi: " + data.message);
                }
            } catch (e) {
                alert("⚠️ Lỗi kết nối khi gửi email.");
            }
        }
    </script>
</body>


</html>
