<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PCCC Digital · Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* (Giữ nguyên toàn bộ style như trên) */
        :root {
            --primary: #ff4d4d;
            --primary-glow: rgba(255, 77, 77, 0.4);
            --success: #00e676;
            --success-dark: #00c853;
            --danger: #ff1744;
            --danger-dark: #d50000;
            --warning: #ffc107;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --toast-bg: rgba(10, 10, 20, 0.9);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            color: var(--text-main);
        }

        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 4px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px 16px;
            box-shadow: var(--shadow);
        }

        /* ===== HEADER ===== */
        .header-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .header-section h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== CARDS ===== */
        .section-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 18px 16px;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        .section-title {
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 12px;
        }

        .id-badge {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 14px 16px;
            font-family: 'Outfit', monospace;
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            color: var(--primary);
            border: 1px dashed var(--primary);
            word-break: break-word;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            transition: border 0.2s;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        /* ===== BUTTON GROUP (RADIO) ===== */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-group input[type="radio"] {
            display: none;
        }

        .btn-group label {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .btn-group label .btn-icon {
            font-size: 24px;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        input[type="radio"]:checked + label {
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        input[value="Đạt"]:checked + label,
        input[value="Còn hạn"]:checked + label {
            background: var(--success);
            color: #000;
        }

        input[value="Lỗi"]:checked + label,
        input[value="Hết hạn"]:checked + label {
            background: var(--danger);
        }

        /* ===== QR SCANNER ===== */
        #qr-reader {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            margin-bottom: 12px;
            border: 2px solid var(--primary);
            background: #000;
        }

        #qr-reader video {
            width: 100% !important;
            border-radius: 16px;
            object-fit: cover;
        }

        .close-scanner {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .close-scanner:hover {
            background: rgba(255,77,77,0.8);
        }

        /* ===== EMPLOYEE INFO ===== */
        .employee-info {
            margin-top: 12px;
            padding: 12px;
            border-radius: 16px;
            font-weight: 600;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .employee-info.success {
            background: rgba(0,230,118,0.15);
            color: var(--success);
        }

        .employee-info.error {
            background: rgba(255,23,68,0.15);
            color: #ff8a80;
        }

        /* ===== ADMIN LINK ===== */
        #adminLink {
            margin-top: 12px;
            text-align: center;
        }

        #adminLink a {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        /* ===== FILE UPLOAD ===== */
        .file-upload-card {
            border: 2px dashed var(--glass-border);
            border-radius: 24px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-upload-card:hover {
            background: rgba(255,255,255,0.02);
        }

        #anhChup {
            display: none;
        }

        #previewBox {
            position: relative;
            display: none;
            margin-top: 12px;
        }

        #previewAnh {
            width: 100%;
            border-radius: 20px;
            border: 2px solid var(--success);
        }

        .remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .remove-image:hover {
            background: var(--danger);
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #ff4d4d, #f44336);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 10px 20px rgba(255,77,77,0.3);
            transition: opacity 0.2s;
        }

        .btn-submit:disabled {
            background: #444;
            opacity: 0.5;
            box-shadow: none;
            pointer-events: none;
        }

        /* ===== LOADING OVERLAY ===== */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #loading-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            max-width: 400px;
            margin: 0 auto;
            background: var(--toast-bg);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            font-weight: 500;
            box-shadow: var(--shadow);
            display: none;
            z-index: 2500;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #toast.success { background: rgba(0,230,118,0.9); color: #000; }
        #toast.error { background: rgba(255,23,68,0.9); }
        #toast.warning { background: rgba(255,193,7,0.9); color: #000; }

        /* ===== MANUAL INPUT (CHỈ DÙNG KHI QR LỖI) ===== */
        #manualInputContainer {
            display: none;
            margin-top: 12px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        /* ===== WARNING DUPLICATE ===== */
        #warning-duplicate {
            background: rgba(255,23,68,0.2);
            border: 1px solid var(--danger);
            color: #ff8a80;
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Đang xử lý...</div>
    </div>
    <div id="toast"></div>

    <div class="app-container">
        <div class="header-section">
            <h2>PCCC DIGITAL</h2>
            <p>Smart Inspection · Pro</p>
        </div>

        <div id="warning-duplicate">⚠️ VỊ TRÍ NÀY ĐÃ ĐƯỢC KIỂM TRA TRONG THÁNG!</div>

        <!-- Mã vị trí / thiết bị -->
        <div class="section-card">
            <label class="section-title">📍 Mã vị trí / thiết bị</label>
            <div id="qr-reader">
                <button class="close-scanner" id="closeScannerBtn" title="Đóng camera">✕</button>
            </div>

            <div style="display: flex; gap: 10px; align-items: stretch;">
                <div id="maTB_Badge" class="id-badge" style="flex:1;">WAITING QR...</div>
                <button id="btnScanner" class="btn-scanner" style="background: var(--primary); border: none; border-radius: 16px; padding: 0 18px; cursor: pointer; color: white; font-size: 24px;" title="Quét mã QR">📷</button>
            </div>
            <input type="hidden" id="maTB">

            <!-- Nút nhập tay chỉ dùng khi QR lỗi -->
            <button id="showManualBtn" class="btn-secondary">⌨️ Nhập tay (khi QR lỗi)</button>
            <div id="manualInputContainer">
                <input type="text" id="manualMaTB" class="input-field" placeholder="Nhập mã thiết bị..." style="margin-top:8px;">
                <div style="display: flex; gap:8px; margin-top:8px;">
                    <button id="applyManualBtn" class="btn-secondary" style="background: var(--primary);">Xác nhận</button>
                    <button id="cancelManualBtn" class="btn-secondary">Hủy</button>
                </div>
            </div>
        </div>

        <!-- Nhân viên -->
        <div class="section-card">
            <label class="section-title">👤 Nhân viên kiểm tra</label>
            <input type="text" id="maNV" class="input-field" placeholder="NHẬP MÃ NV..." autocomplete="off">
            <div id="tenNV_Display" class="employee-info" style="display: none;"></div>
            <div id="adminLink" style="display: none;">
                <a href="admin.html">⚙️ ĐẾN TRANG QUẢN TRỊ (ADMIN)</a>
            </div>
        </div>

        <!-- Trạng thái -->
        <div class="section-card">
            <label class="section-title">🔎 Trạng thái thiết bị</label>
            <p class="text-muted" style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">Ngoại quan</p>
            <div class="btn-group">
                <input type="radio" id="nq-dat" name="ngoaiQuan" value="Đạt" checked>
                <label for="nq-dat"><span class="btn-icon">✅</span><span>ĐẠT</span></label>
                <input type="radio" id="nq-loi" name="ngoaiQuan" value="Lỗi">
                <label for="nq-loi"><span class="btn-icon">❌</span><span>LỖI</span></label>
            </div>

            <p class="text-muted" style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">Áp suất</p>
            <div class="btn-group">
                <input type="radio" id="as-dat" name="apSuat" value="Đạt" checked>
                <label for="as-dat"><span class="btn-icon">⚡</span><span>OK</span></label>
                <input type="radio" id="as-loi" name="apSuat" value="Lỗi">
                <label for="as-loi"><span class="btn-icon">⚠️</span><span>LỖI</span></label>
            </div>

            <p class="text-muted" style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">Hạn sử dụng</p>
            <div class="btn-group">
                <input type="radio" id="hsd-con" name="hanSD" value="Còn hạn" checked>
                <label for="hsd-con"><span class="btn-icon">📅</span><span>CÒN HẠN</span></label>
                <input type="radio" id="hsd-het" name="hanSD" value="Hết hạn">
                <label for="hsd-het"><span class="btn-icon">⌛</span><span>HẾT HẠN</span></label>
            </div>

            <div id="box-ghichu" style="display: none;">
                <textarea id="ghiChu" rows="3" class="input-field" placeholder="Ghi chú chi tiết..."></textarea>
            </div>
        </div>

        <!-- Ảnh -->
        <div class="section-card">
            <label class="section-title">📸 Minh chứng hình ảnh</label>
            <label for="anhChup" id="label-upload">
                <div class="file-upload-card">
                    <div style="font-size: 42px;">📷</div>
                    <div style="font-weight:600;">CHỤP ẢNH TẠI HIỆN TRƯỜNG</div>
                </div>
            </label>
            <input type="file" id="anhChup" accept="image/*" capture="environment">
            <div id="previewBox">
                <img id="previewAnh" src="" alt="Preview">
                <button class="remove-image" id="removeImageBtn" title="Xóa ảnh">✕</button>
            </div>
        </div>

        <button id="btnSubmit" class="btn-submit">XÁC NHẬN GỬI BÁO CÁO</button>
    </div>

    <script>
        (function() {
            // ==================== CẤU HÌNH ====================
            const CONFIG = {
                SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzDjEk_33uvlchMhSiYndcpBed8nfV_VDCBm2Msf6XI93wU-mMgpQC0eXQVa6fbAZ5W/exec",  // <--- Thay URL thật
                CLOUD_NAME: "dlajbw9jc",
                UPLOAD_PRESET: "pccc_anh"
            };

            // ==================== STATE & DOM ====================
            const dom = {
                // Mã TB
                maTB_Badge: document.getElementById('maTB_Badge'),
                maTB_Hidden: document.getElementById('maTB'),
                qrReader: document.getElementById('qr-reader'),
                btnScanner: document.getElementById('btnScanner'),
                closeScannerBtn: document.getElementById('closeScannerBtn'),
                showManualBtn: document.getElementById('showManualBtn'),
                manualInputContainer: document.getElementById('manualInputContainer'),
                manualMaTB: document.getElementById('manualMaTB'),
                applyManualBtn: document.getElementById('applyManualBtn'),
                cancelManualBtn: document.getElementById('cancelManualBtn'),

                // Nhân viên
                maNV: document.getElementById('maNV'),
                tenNV_Display: document.getElementById('tenNV_Display'),
                adminLink: document.getElementById('adminLink'),

                // Trạng thái
                ngoaiQuanRadios: document.getElementsByName('ngoaiQuan'),
                apSuatRadios: document.getElementsByName('apSuat'),
                hanSDRadios: document.getElementsByName('hanSD'),
                ghiChuBox: document.getElementById('box-ghichu'),
                ghiChu: document.getElementById('ghiChu'),

                // Ảnh
                anhChup: document.getElementById('anhChup'),
                labelUpload: document.getElementById('label-upload'),
                previewBox: document.getElementById('previewBox'),
                previewAnh: document.getElementById('previewAnh'),
                removeImageBtn: document.getElementById('removeImageBtn'),

                // Warning & submit
                warningDuplicate: document.getElementById('warning-duplicate'),
                btnSubmit: document.getElementById('btnSubmit'),

                // Loading & toast
                loadingOverlay: document.getElementById('loading-overlay'),
                loadingText: document.getElementById('loading-text'),
                toast: document.getElementById('toast')
            };

            let html5QrCode = null; // instance scanner

            // ==================== UTILS ====================
            function showToast(message, type = 'info', duration = 3000) {
                const toast = dom.toast;
                toast.textContent = message;
                toast.className = ''; // reset
                toast.classList.add(type);
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, duration);
            }

            function showLoading(text = 'Đang xử lý...') {
                dom.loadingText.textContent = text;
                dom.loadingOverlay.style.display = 'flex';
            }

            function hideLoading() {
                dom.loadingOverlay.style.display = 'none';
            }

            // ==================== QR SCANNER ====================
            function initScanner() {
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("qr-reader");
                }
            }

            function startScanner() {
                initScanner();
                dom.qrReader.style.display = 'block';
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    onScanFailure
                ).catch(err => {
                    showToast('Không thể mở camera. Hãy kiểm tra quyền truy cập.', 'error');
                    dom.qrReader.style.display = 'none';
                });
            }

            function stopScanner() {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => {
                        dom.qrReader.style.display = 'none';
                    }).catch(e => console.warn('Stop error', e));
                } else {
                    dom.qrReader.style.display = 'none';
                }
            }

            function onScanSuccess(decodedText) {
                stopScanner();
                try {
                    let id = decodedText.includes('?id=') ? new URL(decodedText).searchParams.get('id') : decodedText;
                    if (!id) throw new Error('Không tìm thấy mã');
                    setMaTB(id.trim().toUpperCase());
                } catch (e) {
                    showToast('Mã QR không hợp lệ!', 'error');
                }
            }

            function onScanFailure(error) {
                // ignore
            }

            function setMaTB(value) {
                dom.maTB_Badge.textContent = value;
                dom.maTB_Hidden.value = value;
                checkStatus(value);
            }

            // ==================== KIỂM TRA TRÙNG ====================
            async function checkStatus(id) {
                showLoading('Kiểm tra trạng thái thiết bị...');
                try {
                    const res = await fetch(CONFIG.SCRIPT_URL + '?maTB=' + encodeURIComponent(id));
                    const data = await res.json();
                    if (data.status === 'inspected') {
                        dom.warningDuplicate.style.display = 'block';
                        dom.btnSubmit.disabled = true;
                    } else {
                        dom.warningDuplicate.style.display = 'none';
                        dom.btnSubmit.disabled = false;
                    }
                } catch (e) {
                    console.warn('Không thể kiểm tra trạng thái', e);
                } finally {
                    hideLoading();
                }
            }

            // ==================== NHÂN VIÊN ====================
            let lookupController = null;
            async function lookupEmployee() {
                const maNV = dom.maNV.value.trim().toUpperCase();
                if (maNV.length < 3) {
                    dom.tenNV_Display.style.display = 'none';
                    dom.adminLink.style.display = 'none';
                    return;
                }

                if (lookupController) {
                    lookupController.abort();
                }
                lookupController = new AbortController();

                try {
                    const res = await fetch(CONFIG.SCRIPT_URL + '?action=getEmployee&maNV=' + encodeURIComponent(maNV), {
                        signal: lookupController.signal
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        dom.tenNV_Display.textContent = `👤 ${data.name} (${data.role || 'User'})`;
                        dom.tenNV_Display.className = 'employee-info success';
                        dom.tenNV_Display.style.display = 'block';

                        if (data.role && data.role.toUpperCase() === 'ADMIN') {
                            dom.adminLink.style.display = 'block';
                        } else {
                            dom.adminLink.style.display = 'none';
                        }
                    } else {
                        dom.tenNV_Display.textContent = '❌ Không tìm thấy nhân viên';
                        dom.tenNV_Display.className = 'employee-info error';
                        dom.tenNV_Display.style.display = 'block';
                        dom.adminLink.style.display = 'none';
                    }
                } catch (e) {
                    if (e.name === 'AbortError') return;
                    dom.tenNV_Display.textContent = '❌ Lỗi kết nối';
                    dom.tenNV_Display.className = 'employee-info error';
                    dom.tenNV_Display.style.display = 'block';
                }
            }

            let lookupTimer;
            function onMaNVInput() {
                clearTimeout(lookupTimer);
                lookupTimer = setTimeout(lookupEmployee, 600);
            }

            // ==================== HIỆN GHICHU KHI CÓ LỖI ====================
            function toggleGhiChu() {
                const nq = document.querySelector('input[name="ngoaiQuan"]:checked')?.value;
                const as = document.querySelector('input[name="apSuat"]:checked')?.value;
                const hsd = document.querySelector('input[name="hanSD"]:checked')?.value;
                const hasError = (nq === 'Lỗi' || as === 'Lỗi' || hsd === 'Hết hạn');
                dom.ghiChuBox.style.display = hasError ? 'block' : 'none';
            }

            // ==================== ẢNH PREVIEW & XÓA ====================
            function previewImage(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        dom.previewAnh.src = e.target.result;
                        dom.previewBox.style.display = 'block';
                        dom.labelUpload.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            }

            function removeImage() {
                dom.anhChup.value = '';
                dom.previewBox.style.display = 'none';
                dom.labelUpload.style.display = 'block';
                dom.previewAnh.src = '';
            }

            // ==================== GỬI DỮ LIỆU ====================
            async function submitData() {
                const maTB = dom.maTB_Hidden.value.trim();
                const maNV = dom.maNV.value.trim().toUpperCase();
                const file = dom.anhChup.files[0];

                if (!maTB) {
                    showToast('Chưa có mã thiết bị! Hãy quét QR hoặc nhập tay.', 'warning');
                    return;
                }
                if (!maNV) {
                    showToast('Vui lòng nhập mã nhân viên!', 'warning');
                    return;
                }
                if (!file) {
                    showToast('Bạn chưa chụp ảnh minh chứng!', 'warning');
                    return;
                }

                dom.btnSubmit.disabled = true;
                showLoading('Đang xử lý ảnh...');

                try {
                    const base64 = await resizeImage(file);

                    showLoading('Đang tải ảnh lên Cloud...');
                    const fd = new FormData();
                    fd.append('file', base64);
                    fd.append('upload_preset', CONFIG.UPLOAD_PRESET);
                    const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: fd
                    });
                    if (!cloudRes.ok) throw new Error('Upload ảnh thất bại');
                    const cloudData = await cloudRes.json();

                    showLoading('Đang ghi sổ cái...');
                    const payload = {
                        maNV,
                        maTB,
                        ngoaiQuan: document.querySelector('input[name="ngoaiQuan"]:checked').value,
                        apSuat: document.querySelector('input[name="apSuat"]:checked').value,
                        hanSD: document.querySelector('input[name="hanSD"]:checked').value,
                        ghiChu: dom.ghiChu.value,
                        linkAnh: cloudData.secure_url
                    };

                    const sheetRes = await fetch(CONFIG.SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const sheetData = await sheetRes.json();

                    if (sheetData.status === 'success') {
                        localStorage.setItem('savedMaNV', maNV);
                        showToast('✅ Gửi báo cáo thành công!', 'success');

                        // Reset form nhưng không tự động mở camera
                        resetForm();
                        // Người dùng sẽ chủ động bấm nút camera để quét tiếp
                    } else {
                        throw new Error(sheetData.message || 'Lỗi không xác định từ server');
                    }
                } catch (err) {
                    showToast('❌ ' + err.message, 'error');
                    dom.btnSubmit.disabled = false;
                } finally {
                    hideLoading();
                }
            }

            function resizeImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const scale = Math.min(1000 / img.width, 1);
                            canvas.width = img.width * scale;
                            canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            function resetForm() {
                dom.maTB_Badge.textContent = 'WAITING QR...';
                dom.maTB_Hidden.value = '';
                removeImage();
                dom.ghiChu.value = '';
                dom.warningDuplicate.style.display = 'none';
                dom.btnSubmit.disabled = false;
                document.getElementById('nq-dat').checked = true;
                document.getElementById('as-dat').checked = true;
                document.getElementById('hsd-con').checked = true;
                toggleGhiChu();
            }

            // ==================== KHỞI TẠO & SỰ KIỆN ====================
            function init() {
                const savedNV = localStorage.getItem('savedMaNV');
                if (savedNV) {
                    dom.maNV.value = savedNV;
                    lookupEmployee();
                }

                document.querySelectorAll('input[name="ngoaiQuan"], input[name="apSuat"], input[name="hanSD"]').forEach(radio => {
                    radio.addEventListener('change', toggleGhiChu);
                });

                dom.btnScanner.addEventListener('click', () => {
                    if (dom.qrReader.style.display === 'block') {
                        stopScanner();
                    } else {
                        startScanner();
                    }
                });

                dom.closeScannerBtn.addEventListener('click', stopScanner);

                dom.showManualBtn.addEventListener('click', () => {
                    dom.manualInputContainer.style.display = 'block';
                });

                dom.applyManualBtn.addEventListener('click', () => {
                    const val = dom.manualMaTB.value.trim().toUpperCase();
                    if (val) {
                        setMaTB(val);
                        dom.manualInputContainer.style.display = 'none';
                        dom.manualMaTB.value = '';
                    } else {
                        showToast('Vui lòng nhập mã', 'warning');
                    }
                });

                dom.cancelManualBtn.addEventListener('click', () => {
                    dom.manualInputContainer.style.display = 'none';
                    dom.manualMaTB.value = '';
                });

                dom.maNV.addEventListener('input', onMaNVInput);

                dom.anhChup.addEventListener('change', previewImage);
                dom.removeImageBtn.addEventListener('click', removeImage);

                dom.btnSubmit.addEventListener('click', submitData);

                const urlParams = new URLSearchParams(window.location.search);
                const idThietBi = urlParams.get('id');
                if (idThietBi) {
                    setMaTB(idThietBi.toUpperCase());
                }
            }

            init();
        })();
    </script>
</body>
</html>
